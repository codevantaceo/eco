apiVersion: v1
kind: Service
metadata:
  annotations:
    eco-base/audit-log-level: minimal
    eco-base/governance-policy: standard-v1
    eco-base/uri: eco-base://k8s/core/service/loki-headless
    eco-base/urn: urn:eco-base:k8s:core:service:loki-headless:sha256-daa34f278f68e220b3e97e6dd8007b2008808f70fe06c17d1abb57fd88d799c9
  labels:
    app: superai-platform
